name: Initial Data Seed (One-Time)

on:
  workflow_dispatch:  # Only runs when you manually trigger it

jobs:
  seed:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install -r requirements.txt
      
      - name: Run Initial Seed
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
import sys
sys.path.append('.')
from data_loader import seed_dataset
seed_dataset()
print('Seed complete!')
          "
      
      - name: Verify Upload
        run: |
          echo "Dataset seeded to HuggingFace"
          echo "Check your HF dataset repo: P2SAMAPA/etf-entropy-dataset"
