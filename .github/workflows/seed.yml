name: Initial Dataset Seed

on:
  workflow_dispatch:  # Only manual trigger

jobs:
  seed-dataset:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install -r requirements.txt
      
      - name: Seed Dataset (2008-Present)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from data_loader import seed_dataset
          print('Starting initial seed...')
          seed_dataset()
          print('Seed complete!')
          "
      
      - name: Verify Upload
        run: |
          python -c "
          from data_loader import load_metadata
          meta = load_metadata()
          if meta:
              print(f'Success! Dataset seeded till: {meta[\\\"last_data_update\\\"]}')
          else:
              print('Warning: Metadata not found')
          "
