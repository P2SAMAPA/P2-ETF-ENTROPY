name: ETF Entropy Pipeline
on:
  schedule:
    # Daily data update: Mon-Fri at 8pm EST (1am UTC next day)
    - cron: '0 1 * * 2-6'
    # Weekly full retraining: Saturday at 11pm EST (4am UTC Sunday)
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      run_training:
        description: 'Run full retraining'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      start_year:
        description: 'Start year for training (e.g. 2008, 2012, 2019)'
        required: false
        default: '2008'
        type: string

jobs:
  # ── Data update (common) ───────────────────────────────────────────────────
  data-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Daily Incremental Update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_data.py

  # ── Training Option A (FI/Commodities) ─────────────────────────────────────
  train-option-a:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [data-update]
    if: >
      github.event.schedule == '0 4 * * 0' ||
      github.event.inputs.run_training == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Train Option A
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TRAINING_START_YEAR: ${{ github.event.inputs.start_year || '2012' }}
        run: |
          echo "Training Option A for year $TRAINING_START_YEAR..."
          python train_models.py --option a
          echo "Option A training complete."

  # ── Training Option B (Equity Sectors) ─────────────────────────────────────
  train-option-b:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [data-update]
    if: >
      github.event.schedule == '0 4 * * 0' ||
      github.event.inputs.run_training == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Train Option B
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TRAINING_START_YEAR: ${{ github.event.inputs.start_year || '2012' }}
        run: |
          echo "Training Option B for year $TRAINING_START_YEAR..."
          python train_models.py --option b
          echo "Option B training complete."

  # ── Commit model info to GitHub (optional) ────────────────────────────────
  commit-model-info:
    runs-on: ubuntu-latest
    needs: [train-option-a, train-option-b]
    if: always() && !cancelled() && (needs.train-option-a.result == 'success' || needs.train-option-b.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git user
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit best_model.json files if they exist
        run: |
          mkdir -p artifacts/option_a artifacts/option_b
          git add artifacts/option_a/best_model.json artifacts/option_b/best_model.json || true
          git diff --staged --quiet || git commit -m "Update best model info [$(date +%Y-%m-%d)]"
          git push || echo "Push failed — HF upload already succeeded"
