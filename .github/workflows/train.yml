name: ETF Entropy Pipeline

on:
  schedule:
    - cron: '30 0 * * 2-6'
  workflow_dispatch:
    inputs:
      run_training:
        description: 'Run full retraining'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  update-and-train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_PAT }}  # Use PAT for push permissions
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install -r requirements.txt
      
      - name: Daily Incremental Update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_data.py
      
      - name: Weekly Full Retraining
        if: github.event.schedule == '30 0 * * 6' || github.event.inputs.run_training == 'true'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Starting training..."
          python train_models.py
          echo "Training complete. Checking artifacts..."
          ls -la artifacts/ || echo "No artifacts folder!"
      
      - name: Commit and Push Artifacts
        if: github.event.schedule == '30 0 * * 6' || github.event.inputs.run_training == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check what's in artifacts
          echo "Contents of artifacts/:"
          ls -la artifacts/ || echo "Folder doesn't exist"
          
          # Stage all artifacts
          git add -f artifacts/
          
          # Check status
          git status
          
          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add model artifacts [$(date +%Y-%m-%d)]"
            git push
            echo "Artifacts committed and pushed!"
          fi
