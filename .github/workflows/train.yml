name: ETF Entropy Pipeline
on:
  schedule:
    # Daily data update: Mon-Fri at 8pm EST (1am UTC next day)
    - cron: '0 1 * * 2-6'
    # Weekly full retraining: Saturday at 11pm EST (4am UTC Sunday)
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      run_training:
        description: 'Run full retraining'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      start_year:
        description: 'Start year for training (e.g. 2008, 2012, 2019)'
        required: false
        default: '2012'
        type: string

jobs:
  update-and-train:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ── Daily: incremental data update ──────────────────────────────
      - name: Daily Incremental Update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_data.py

      # ── Weekly or manual: full retraining ───────────────────────────
      - name: Weekly Full Retraining
        if: >
          github.event.schedule == '0 4 * * 0' ||
          github.event.inputs.run_training == 'true'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TRAINING_START_YEAR: ${{ github.event.inputs.start_year || '2012' }}
        run: |
          echo "Starting full retraining for year $TRAINING_START_YEAR..."
          python train_models.py
          echo "Training complete."

      # ── Commit best_model.json back to repo for reference ───────────
      - name: Commit model info to GitHub
        if: >
          github.event.schedule == '0 4 * * 0' ||
          github.event.inputs.run_training == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          mkdir -p artifacts
          git add artifacts/best_model.json || true
          git diff --staged --quiet || git commit -m "Update best model info [$(date +%Y-%m-%d)]"
          git push || echo "Push failed — HF upload already succeeded"
