name: ETF Entropy Pipeline

on:
  schedule:
    - cron: '30 0 * * 2-6'
  workflow_dispatch:
    inputs:
      run_training:
        description: 'Run full retraining'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  update-and-train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # Keep 3.10 for training
      
      - name: Install Dependencies
        run: pip install -r requirements.txt
      
      - name: Daily Incremental Update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_data.py
      
      - name: Weekly Full Retraining
        if: github.event.schedule == '30 0 * * 6' || github.event.inputs.run_training == 'true'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_models.py
      
      - name: Commit artifacts to repo
        if: github.event.schedule == '30 0 * * 6' || github.event.inputs.run_training == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "artifacts/.gitkeep" ]; then
            if [ "$(ls -A artifacts/*.pkl 2>/dev/null)" ]; then
              git rm artifacts/.gitkeep || true
            fi
          fi
          git add artifacts/
          git commit -m "Add model artifacts [$(date +%Y-%m-%d)]" || echo "No changes to commit"
          git push || echo "Nothing to push"
