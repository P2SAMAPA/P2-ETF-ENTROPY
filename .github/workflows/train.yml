name: ETF Entropy Pipeline

on:
  schedule:
    - cron: '30 0 * * 2-6'
  workflow_dispatch:
    inputs:
      run_training:
        description: 'Run full retraining'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  update-and-train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install -r requirements.txt
      
      - name: Daily Incremental Update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_data.py
      
      - name: Weekly Full Retraining
        if: github.event.schedule == '30 0 * * 6' || github.event.inputs.run_training == 'true'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Starting training..."
          python train_models.py
          echo "Training complete."
      
      - name: Upload Artifacts to HuggingFace
        if: github.event.schedule == '30 0 * * 6' || github.event.inputs.run_training == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python upload_artifacts.py
      
      - name: Commit small files to GitHub
        if: github.event.schedule == '30 0 * * 6' || github.event.inputs.run_training == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add artifacts/best_model.json
          git commit -m "Update best model info [$(date +%Y-%m-%d)]" || echo "No changes"
          git push || echo "Push failed, but HF upload succeeded"
